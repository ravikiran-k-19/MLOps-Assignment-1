name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        # Fail the build on any linting error
        run: |
          flake8 src/ app/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E501,W503

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ \
            --cov=src \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test   # only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create empty models directory (required by Dockerfile COPY)
        run: mkdir -p models

      - name: Build Docker image
        run: |
          docker build \
            --tag heart-disease-api:${{ github.sha }} \
            --tag heart-disease-api:latest \
            .
