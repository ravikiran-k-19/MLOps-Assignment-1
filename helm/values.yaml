replicaCount: 2
image:
repository: heart-disease-api
tag: latest
pullPolicy: IfNotPresent
service:
type: ClusterIP
port: 8000
resources:
requests:
cpu: "100m"
memory: "128Mi"
limits:
cpu: "500m"
memory: "512Mi"
autoscaling:
enabled: true
minReplicas: 2
maxReplicas: 5
targetCPUUtilizationPercentage: 70
ingress:
enabled: false
className: nginx
host: heart-api.local
prometheus:
enabled: true
path: /metrics
port: "8000"